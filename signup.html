<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign Up - MovieGuide</title>
    <link rel="icon" href="./img/logo.ico">

</head>

<body>

    <!-- Background Particles -->
    <div class="global-particles" id="global-particles"></div>

    <nav>
        <a href="home.html" class="logo">MovieGuide</a>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="index.html">Search Movies</a></li>
            <li><a href="trending.html">Discover</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="login.html">Log In</a></li>
        </ul>
    </nav>

    <div class="auth-page-wrapper">
        <div class="auth-card">
            <div class="auth-card-header">
                <div class="auth-logo-mark">🎬</div>
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Join MovieGuide and start exploring films</p>
            </div>
            <div class="auth-fields">
                <input type="text" id="fullname" class="signup-input" placeholder="Full Name">
                <input type="email" id="email" class="signup-input" placeholder="Email Address">
                <input type="password" id="password" class="signup-input" placeholder="Create Password">

                <button id="signup-btn" class="signup-btn">Sign Up</button>
                <p id="signup-success" class="success-msg"></p>
                <p id="error-msg" class="error-msg">Please fill in all fields</p>
            </div>
            <p class="auth-switch">Already have an account? <a href="login.html">Log In</a></p>
        </div>
    </div>



    <script src="auth.js"></script>
</body>

</html>
