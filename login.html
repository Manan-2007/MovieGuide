<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login - MovieGuide</title>
    <link rel="icon" href="./img/logo.ico">

</head>

<body>

    <!-- Background Particles -->
    <div class="global-particles" id="global-particles"></div>

    <nav>
        <a href="home.html" class="logo">MovieGuide</a>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="index.html">Search Movies</a></li>
            <li><a href="trending.html">Discover</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="login.html" class="active">Log In</a></li>
        </ul>
    </nav>

    <div class="auth-page-wrapper">
        <div class="auth-card">
            <div class="auth-card-header">
                <div class="auth-logo-mark">🎬</div>
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Sign in to your MovieGuide account</p>
            </div>
            <div class="auth-fields">
                <input type="text" id="username" class="login-input" placeholder="Username or Email">
                <input type="password" id="password" class="login-input" placeholder="Password">

                <div class="forgot-link-row">
                    <a href="forgot_password.html" class="forgot-link">Forgot Password?</a>
                </div>

                <button id="login-btn" class="login-btn">Log In</button>
                <p id="error-msg" class="error-msg">Please fill in both fields</p>
            </div>
            <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>



    <script src="auth.js"></script>
</body>

</html>
