<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login - MovieGuide</title>
    <link rel="icon" href="./img/logo.ico">

</head>

<body>

    <nav>
        <a href="index.html" class="logo">MovieGuide</a>
        <ul class="nav-links">
            <li><a href="index.html">Search Movies</a></li>
            <li><a href="trending.html">Trending Now</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="login.html" class="active">Log In</a></li>
        </ul>
    </nav>

    <div class="centered-container" style="text-align: center;">
        <h2 style="margin-bottom: 2rem; color: #ffb92a;">Welcome Back</h2>

        <input type="text" id="username" class="login-input" placeholder="Username">
        <input type="password" id="password" class="login-input" placeholder="Password">

        <button id="login-btn" class="login-btn">Log In</button>
        <p id="error-msg" class="error-msg">Please fill in both fields</p>

        <p style="margin-top: 1.5rem; font-size: 0.9rem; color: #a0a0a0;">
            Don't have an account? <a href="signup.html"
                style="color: #ffb92a; cursor: pointer; text-decoration: none;">Sign Up</a>
        </p>
    </div>



    <script src="index.js"></script>
</body>

</html>
